<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director & Visual Artist | 作品展示</title>
    <style>
        /* 全局样式设定：极简、暗黑、电影感 */
        :root {
            --bg-color: #050505;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --accent-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: var(--text-main); transition: color 0.3s ease; }
        a:hover { color: var(--text-muted); }

        /* 导航栏：悬浮在顶部，不干扰视线 */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(5,5,5,0.8) 0%, rgba(5,5,5,0) 100%);
        }
        
        .logo { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links a { margin-left: 2rem; font-size: 0.9rem; letter-spacing: 1px; }

        /* 首页核心视觉区 (Hero Section)：放置你的 Showreel */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* 视频背景占位符 */
        .hero-video-bg {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translateX(-50%) translateY(-50%);
            z-index: -1;
            background: #111; /* 在视频加载前的底色 */
            opacity: 0.6; /* 压低亮度，凸显文字 */
        }

        .hero-content { text-align: center; z-index: 1; }
        .hero-title { font-size: 4rem; font-weight: 300; letter-spacing: 4px; margin-bottom: 1rem; }
        .hero-subtitle { font-size: 1.2rem; color: var(--text-muted); letter-spacing: 2px; }

        /* 作品集网格区域 */
        .portfolio { padding: 8rem 5%; }
        .section-title { font-size: 2rem; margin-bottom: 3rem; font-weight: 300; border-bottom: 1px solid #333; padding-bottom: 1rem; }

        .work-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .work-item {
            position: relative;
            aspect-ratio: 16 / 9;
            background-color: #1a1a1a;
            overflow: hidden;
            cursor: pointer;
            border-radius: 4px;
        }

        /* 响应式 iframe 容器，用于无缝嵌入外部视频 */
        .video-container {
            position: relative;
            width: 100%; height: 100%;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .work-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none; /* 让鼠标点击穿透到 iframe 上 */
        }
        
        .work-item:hover .work-overlay { opacity: 1; }
        .work-title { font-size: 1.5rem; font-weight: 500; letter-spacing: 1px; }
        .work-category { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.5rem; }

        /* 关于与联系区域 */
        .about-contact { padding: 5rem 5% 8rem; display: flex; flex-wrap: wrap; gap: 4rem; background-color: #0a0a0a; }
        .about-box, .contact-box { flex: 1; min-width: 300px; }
        p { color: var(--text-muted); margin-bottom: 1rem; }
        
        /* 页脚 */
        footer { padding: 2rem 5%; text-align: center; color: #555; font-size: 0.8rem; border-top: 1px solid #111; }

        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .nav-links { display: none; } /* 移动端精简导航 */
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">DIRECTOR.</div>
        <div class="nav-links">
            <a href="#work" class="scroll-link">作品 (WORK)</a>
            <a href="#about" class="scroll-link">关于 (ABOUT)</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-video-bg"></div>
        <div class="hero-content">
            <h1 class="hero-title">捕捉光影的秩序</h1>
            <p class="hero-subtitle">TVC Commercial | Narrative Short | Visual Arts</p>
        </div>
    </section>

    <section id="work" class="portfolio">
        <h2 class="section-title">精选案例 / Featured Works</h2>
        <div class="work-grid">
            
            <div class="work-item">
                <div class="video-container">
                    <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116412320319364&bvid=BV1PZdbBaESW&cid=37544265921&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>
                </div>
                </div>

            <div class="work-item">
                <div class="video-container">
                    <iframe src="https://player.vimeo.com/video/1084537?h=b1b39eb133&title=0&byline=0&portrait=0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
            
            <div class="work-item" style="background: #222;">
                 <div style="padding: 2rem; color: #666; text-align: center; height: 100%; display: flex; align-items: center; justify-content: center;">
                    待上传案例位置
                 </div>
            </div>

        </div>
    </section>

    <section id="about" class="about-contact">
        <div class="about-box">
            <h2 class="section-title" style="border:none; margin-bottom:1rem;">关于我</h2>
            <p>致力于将复杂叙事与极致的视觉张力结合。专注于高规格影像制作，对镜头纵深调度、物理级光影渲染有严苛的标准。</p>
        </div>
        <div class="contact-box">
            <h2 class="section-title" style="border:none; margin-bottom:1rem;">建立联系</h2>
            <p>合作洽谈与项目问询，请发送邮件至：</p>
            <p><a href="mailto:your.email@example.com" style="color: #fff; font-size: 1.2rem; border-bottom: 1px solid #fff;">your.email@example.com</a></p>
        </div>
    </section>

    <footer>
        &copy; 2026 DIRECTOR PORTFOLIO. ALL RIGHTS RESERVED.
    </footer>

    <script>
        // 平滑滚动交互
        document.querySelectorAll('.scroll-link').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
